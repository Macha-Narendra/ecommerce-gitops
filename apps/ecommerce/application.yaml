apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:
  name: ecommerce

  namespace: argocd

spec:

  project: default

  source:

    repoURL: https://github.com/Macha-Narendra/ecommerce-gitops.git

    targetRevision: HEAD

    path: apps/ecommerce/ecommerce

  destination:

    server: https://kubernetes.default.svc

    namespace: ecommerce

  syncPolicy:

    automated:

      prune: true

      selfHeal: true
